layout: {zmk_keyboard: eyelash_corne}
layers:
  QWERTY:
  - $$mdi:keyboard-tab$$
  - Q
  - W
  - E
  - R
  - T
  - $$mdi:pan-up$$
  - Y
  - U
  - I
  - O
  - P
  - {t: '-', s: _}
  - {t: '$$mdi:keyboard-esc$$', s: '`'}
  - A
  - S
  - D
  - F
  - G
  - $$mdi:pan-left$$
  - $$mdi:alpha-w-box$$
  - $$mdi:pan-right$$
  - H
  - J
  - K
  - L
  - {t: ;, s: ':'}
  - {t: '''', s: '"'}
  - {t: '`', h: 'Alt+Ctl+$$mdi:apple-keyboard-shift$$', s: '~'}
  - Z
  - X
  - C
  - V
  - B
  - MUTE
  - $$mdi:pan-down$$
  - N
  - M
  - {t: ',', s: <}
  - {t: ., s: '>'}
  - {t: /, s: '?'}
  - {t: \, h: LEFT META, s: '|'}
  - $$mdi:apple-keyboard-control$$
  - {t: '$$mdi:backspace-reverse-outline$$', h: NUMBER}
  - {t: '$$mdi:keyboard-return$$', h: '$$mdi:apple-keyboard-shift$$'}
  - {t: '$$mdi:keyboard-space$$', h: '$$mdi:apple-keyboard-shift$$'}
  - {t: '$$mdi:backspace$$', h: NUMBER}
  - $$mdi:apple-keyboard-option$$
  NUMBER:
  - {t: '$$mdi:transfer$$', type: trans}
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - $$mdi:mouse-right-click-outline$$
  - $$mdi:mouse-scroll-wheel$$
  - $$mdi:mouse-left-click-outline$$
  - SCROLLLOCK
  - RGB TOG
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - {t: '7', s: '&'}
  - {t: '8', s: '*'}
  - {t: '9', s: (}
  - {t: '0', s: )}
  - {t: '$$mdi:transfer$$', type: trans}
  - {t: '$$mdi:transfer$$', type: trans}
  - Ctl+A
  - Ctl+C
  - $$mdi:arrow-up-bold$$
  - Ctl+V
  - Ctl+Sft+V
  - {h: '$$mdi:arrow-up-bold$$', s: '$$mdi:bluetooth-connect$$'}
  - {h: '1', s: '$$mdi:bluetooth-connect$$'}
  - {h: '$$mdi:arrow-down-bold$$', s: '$$mdi:bluetooth-connect$$'}
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - '4'
  - {t: '5', s: '%'}
  - '6'
  - {t: '=', s: +}
  - {t: '[', s: '{'}
  - {t: '$$mdi:transfer$$', type: trans}
  - Ctl+Z
  - $$mdi:arrow-left-bold$$
  - $$mdi:arrow-down-bold$$
  - $$mdi:arrow-right-bold$$
  - Ctl+X
  - $$mdi:volume-off$$
  - $$mdi:bluetooth-off$$
  - {t: '$$mdi:minus-circle-outline$$', type: none}
  - '1'
  - '2'
  - '3'
  - .
  - {t: ']', s: '}'}
  - {t: '$$mdi:transfer$$', type: trans}
  - {type: held}
  - {t: '$$mdi:transfer$$', type: trans}
  - {t: '$$mdi:transfer$$', type: trans}
  - {type: held alternate}
  - {t: '$$mdi:transfer$$', type: trans}
